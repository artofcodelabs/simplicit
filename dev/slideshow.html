<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Simplicit > Slideshow</title>
</head>

<body>
  <h1>Simplicit > Slideshow</h1>

  <h2>Slideshow</h2>
  <div data-component="slideshow" id="slideshow">
    <button data-ref="previous"> ← </button>
    <button data-ref="next"> → </button>

    <script type="application/json" data-component="slide">
      [
        { "text": "🐵 #A" },
        { "text": "🙈 #B" },
        { "text": "🙉 #C" },
        { "text": "🙊 #D" }
      ]
    </script>
  </div>

  <h2>Slideshow Manager</h2>
  <div data-component="slideshow-manager">
    <button data-ref="add-slide">Add slide</button>
    <button data-ref="show-slides">Show slides</button>
    <button data-ref="hide-slides">Hide slides</button>
    <button data-ref="manage-slides" disabled>Manage slides</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "Simplicit": "/simplicit.mjs"
      }
    }
  </script>

  <script type="module">
    import { start, Component } from "Simplicit";

    class Slide extends Component {
      static name = "slide";

      static template = ({
        text,
        show = false,
        manage = false,
        current = false,
        editing = false,
        editable = true,
      }) => `
        <div
          data-component="${Slide.name}"
          ${current || show ? "" : "hidden"}
        >
          ${Slide.bodyTemplate({ text, manage, current, editing, editable })}
          <a href="#" data-ref="delete" style="text-decoration: none;" ${manage && !current ? "" : "hidden"}> ❌</a>
        </div>
        `;

      static bodyTemplate = ({ text, manage, current, editing, editable }) => {
        if (current) return `<b data-ref="bold-text">${text}</b>`;
        if (editing)
          return `
            <form data-ref="edit-form" style="display:inline;">
              <input data-ref="edit" type="text" value="${text}" />
            </form>
            `;
        return `
          <span data-ref="caption" style="cursor: ${manage && editable ? "pointer" : "default"};">
            ${text}
          </span>
          `;
      };

      get current() {
        return !!this.props.current;
      }

      connect() {
        this.parent.checkIn(this);
        this.on("delete", "click", (e) => {
          e.preventDefault();
          this.element.remove();
        });
        this.on("caption", "click", () => this.#edit());
        this.on("edit-form", "submit", (e) => {
          e.preventDefault();
          this.#save();
        });
        this.on("edit", "keydown", (e) => {
          if (e.key !== "Escape") return;
          e.preventDefault();
          this.#cancel();
        });
      }

      show() {
        this.update({ show: true });
      }

      hide() {
        if (this.current) return;
        this.update({ show: false });
      }

      changeCurrent({ current, show, manage }) {
        this.update({ current, show, manage, editing: false });
      }

      changeManagement(manage) {
        if (this.current) return;
        this.update({ manage, editing: manage && this.props.editing });
      }

      changeEditable(editable) {
        if (this.current || this.props.editing) return;
        this.update({ editable });
      }

      #edit() {
        if (this.current || !this.props.manage || this.props.editable === false) return;
        this.siblings("slide").forEach((slide) => slide.changeEditable(false));
        this.update({ editing: true });
        this.#focusEdit();
      }

      #save() {
        this.update({ text: this.ref("edit").value, editing: false });
        this.siblings("slide").forEach((slide) => slide.changeEditable(true));
      }

      #cancel() {
        this.update({ editing: false });
        this.siblings("slide").forEach((slide) => slide.changeEditable(true));
      }

      #focusEdit() {
        const edit = this.ref("edit");
        edit.focus();
        edit.setSelectionRange(edit.value.length, edit.value.length);
      }
    }

    class Slideshow extends Component {
      static name = "slideshow";

      constructor() {
        super();
        this.showAll = false;
        this.manageSlides = false;
      }

      get slidesNumber() {
        return this.children("slide").length;
      }

      get currentSlideIndex() {
        return this.children("slide").findIndex((slide) => slide.current);
      }

      connect() {
        this.on("previous", "click", () => this.#changeCurrentSlideIndex(-1));
        this.on("next", "click", () => this.#changeCurrentSlideIndex(1));
      }

      checkIn(slide) {
        if (this.currentSlideIndex !== -1) return;
        const initCurrentSlideIndex = 1;
        if (this.children("slide").findIndex((s) => s === slide) === initCurrentSlideIndex) {
          this.#changeCurrentSlide(initCurrentSlideIndex);
        }
      }

      addSlide(text) {
        const slideHtml = Slide.render({
          text,
          show: this.showAll,
          manage: this.manageSlides,
        });
        this.element.insertAdjacentHTML("beforeend", slideHtml);
      }

      showSlides() {
        this.showAll = true;
        this.children("slide").forEach((slide) => slide.show());
      }

      hideSlides() {
        this.showAll = false;
        this.children("slide").forEach((slide) => slide.hide());
      }

      enableManagement() {
        this.manageSlides = true;
        this.children("slide").forEach((slide) => slide.changeManagement(true));
      }

      disableManagement() {
        this.manageSlides = false;
        this.children("slide").forEach((slide) => slide.changeManagement(false));
      }

      #changeCurrentSlideIndex(diff = 0) {
        let newIndex = this.currentSlideIndex + diff;
        if (newIndex >= this.slidesNumber) {
          newIndex = 0;
        }
        if (newIndex < 0) {
          newIndex = this.slidesNumber - 1;
        }
        this.#changeCurrentSlide(newIndex);
      }

      #changeCurrentSlide(newIndex) {
        this.children("slide").forEach((slide, index) => {
          slide.changeCurrent({ current: index === newIndex, show: this.showAll, manage: this.manageSlides });
        });
      }
    }

    class SlideshowManager extends Component {
      static name = "slideshow-manager";

      constructor() {
        super();
        this.manageSlides = false;
      }

      get slideshow() {
        return this.siblings("slideshow")[0];
      }

      connect() {
        this.on("add-slide", "click", () => this.#addSlide());
        this.on("show-slides", "click", () => this.#showSlides());
        this.on("hide-slides", "click", () => this.#hideSlides());
        this.on("manage-slides", "click", () => this.#manageSlides());
      }

      #addSlide() {
        this.slideshow.addSlide(`🐒 #${this.slideshow.slidesNumber + 1}`);
      }

      #showSlides() {
        this.ref("manage-slides").disabled = false;
        this.slideshow.showSlides();
      }

      #hideSlides() {
        this.manageSlides = false;
        this.ref("manage-slides").disabled = true;
        this.slideshow.hideSlides();
        this.slideshow.disableManagement();
      }

      #manageSlides() {
        this.manageSlides = !this.manageSlides;
        if (this.manageSlides) {
          this.slideshow.enableManagement();
        } else {
          this.slideshow.disableManagement();
        }
      }
    }

    const app = start({ components: [Slide, Slideshow, SlideshowManager] });
  </script>

  <p>
    <a href="/">Simplicit</a>
  </p>
</body>

</html>
